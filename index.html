<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Webpage</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1 id="title">Welcome to My Interactive Page</h1>

    
    <button id="greetBtn">Click for Greeting</button>

    
    <button id="darkModeBtn">Toggle Dark Mode</button>

    <div class="image-container">
        <h2>Hover Image Effect</h2>
        <img id="hoverImage" src="assets/image1.jpg" alt="Main Image">
        <p>Hover over the image to see it change!</p>
    </div>

    
    <div class="gallery">
        <h2>Image Gallery</h2>
        <img src="assets/image1.jpg" alt="Image 1">
        <img src="assets/image2.jpg" alt="Image 2">
    </div>

    
    <script src="script.js"></script>
</body>
</html>
