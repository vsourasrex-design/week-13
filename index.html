<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jungle Website</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="jungleCanvas"></canvas>

<div class="overlay">
  <div class="container">

    <h1 class="leaf">🌿 Welcome Monke 🌿</h1>

    <div class="image-row">
      <img src="image1.jpg" alt="Jungle Image 1" class="jungle-img">
      <img src="image2.jpg" alt="Jungle Image 2" class="jungle-img">
    </div>

    <section>
      <h2>About</h2>
      <p>
        This is my jungle-themed website for Week 13. It represents monke
        and creativity using HTML, CSS, and JavaScript.
      </p>
    </section>

    <section>
      <h2>Explore</h2>
      <p>
        Discover hidden paths, glowing lights, and the mystery of the jungle.
      </p>
      <button onclick="showMessage()">Enter the Jungle</button>
    </section>

    <section>
      <h2>Contact</h2>
      <p>Want to explore more? Reach out!</p>
      <a href="#">Send Message</a>
    </section>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
